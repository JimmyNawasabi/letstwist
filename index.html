<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows & Gold: The Vault</title>
    <style>
        :root {
            --velvet: #4a0e0e;
            --gold: #d4af37;
            --deep-grey: #1a1a1a;
            --soft-white: #fdfaf1;
            --accent-purple: #2e1a31;
        }

        body {
            background-color: var(--soft-white);
            color: var(--deep-grey);
            font-family: 'Palatino', 'Georgia', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #game-container {
            width: 100%;
            max-width: 1100px;
            background: white;
            padding: 40px;
            border-top: 10px solid var(--gold);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        h1, h2, h3 { color: var(--velvet); text-transform: uppercase; letter-spacing: 3px; text-align: center; }

        .setup-section { 
            background: #fffcf5; 
            padding: 25px; 
            border: 1px solid #e0d5b0; 
            border-radius: 8px; 
            margin-bottom: 30px;
        }

        /* Master List Grid */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .category-card {
            background: white;
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 5px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }

        .category-header {
            font-weight: bold;
            color: var(--velvet);
            border-bottom: 2px solid var(--gold);
            margin-bottom: 10px;
            padding-bottom: 5px;
            text-align: center;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }

        .item-row.disabled { color: #ccc; text-decoration: line-through; }

        /* Buttons */
        .btn {
            background: var(--velvet);
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover { background: var(--gold); color: var(--velvet); }
        .btn-small { padding: 4px 8px; font-size: 11px; }
        .btn-toggle { background: #eee; color: #333; border: 1px solid #ccc; }
        .btn-toggle.active { background: #2d5a27; color: white; border-color: #1a3a16; }
        .btn-delete { background: #8b0000; color: white; border: none; margin-left: 5px; }

        .input-group {
            display: flex;
            gap: 10px;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
        }

        input, select { padding: 10px; border: 1px solid var(--gold); border-radius: 4px; flex: 1; }

        .hidden { display: none; }
        
        /* Fetish Tags */
        .fetish-tag {
            display: inline-flex;
            align-items: center;
            background: var(--accent-purple);
            color: var(--gold);
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- PAGE 1: SETUP & MASTER LIST -->
    <div id="setup-page">
        <h1>Shadows & Gold: The Vault</h1>
        
        <div class="setup-section">
            <h3>1. The Participants</h3>
            <div style="display: flex; gap: 20px;">
                <input type="text" id="p1-name" placeholder="Player 1 Name" value="Master">
                <select id="p1-gender"><option value="Male">Male Owner</option><option value="Female">Female Owner</option></select>
                <input type="text" id="p2-name" placeholder="Player 2 Name" value="Submissive">
                <select id="p2-gender"><option value="Female">Female Owner</option><option value="Male">Male Owner</option></select>
            </div>
            <div style="margin-top: 15px; text-align: center;">
                <label>Game Length:</label>
                <input type="number" id="rounds-limit" value="20" style="width: 80px; display: inline-block;"> Rounds
            </div>
        </div>

        <div class="setup-section">
            <h3>2. The Master Inventory</h3>
            <p style="text-align: center;"><small>Toggle items ON for this session, or DELETE them permanently from the vault.</small></p>
            
            <div id="inventory-grid" class="inventory-grid">
                <!-- 6 Categories injected here -->
            </div>

            <div class="input-group">
                <select id="new-item-cat">
                    <option value="The Sting">The Sting (Impact)</option>
                    <option value="The Caress">The Caress (Sensation)</option>
                    <option value="Bound">Bound (Restraints)</option>
                    <option value="Silence">Silence (Gags)</option>
                    <option value="Shadows">Shadows (Blindfolds)</option>
                    <option value="Instruments">Instruments (Toys)</option>
                </select>
                <input type="text" id="new-item-name" placeholder="Add new item to vault...">
                <button class="btn" onclick="vault.addNewItem()">Add Item</button>
            </div>
        </div>

        <div class="setup-section">
            <h3>3. Fetishes & Desires</h3>
            <div id="fetish-list" style="min-height: 50px; border: 1px dashed var(--gold); padding: 10px; margin-bottom: 10px; border-radius: 5px;">
                <!-- Fetishes injected here -->
            </div>
            <div class="input-group">
                <input type="text" id="new-fetish-name" placeholder="Add new fetish...">
                <button class="btn" onclick="vault.addNewFetish()">Add Fetish</button>
            </div>
        </div>

        <button class="btn" style="width: 100%; font-size: 1.6rem; padding: 20px;" onclick="game.start()">COMMENCE PLAY</button>
    </div>

    <!-- PAGE 2: THE GAME (Placeholder for flow) -->
    <div id="play-page" class="hidden">
        <h2 id="round-heading">Round 1</h2>
        <div id="game-arena" class="setup-section">
            <p style="text-align: center; font-size: 1.2rem;">The game logic is now connected to your Master List.</p>
            <button class="btn" onclick="location.reload()">Back to Vault</button>
        </div>
    </div>
</div>

<script>
/**
 * THE VAULT SYSTEM (Persistence & UI)
 */
const CATEGORIES = ["The Sting", "The Caress", "Bound", "Silence", "Shadows", "Instruments"];

const vault = {
    // Initial Master List Data
    data: JSON.parse(localStorage.getItem('sg_master_vault')) || {
        items: {
            "The Sting": [{name: "Leather Crop", active: true}, {name: "Flogger", active: true}, {name: "Paddle", active: true}],
            "The Caress": [{name: "Ice", active: true}, {name: "Wartenberg Wheel", active: true}, {name: "Feather", active: true}],
            "Bound": [{name: "Silk Rope", active: true}, {name: "Wrist Cuffs", active: true}, {name: "Spreader Bar", active: true}],
            "Silence": [{name: "Ball Gag", active: true}, {name: "Ring Gag", active: true}, {name: "Medical Tape", active: true}],
            "Shadows": [{name: "Silk Blindfold", active: true}, {name: "Blackout Mask", active: true}],
            "Instruments": [{name: "Vibrator", active: true}, {name: "Glass Wand", active: true}, {name: "Dildo", active: true}]
        },
        fetishes: ["Bondage", "Impact Play", "Sensory Deprivation", "Edge Play"]
    },

    init() {
        this.render();
    },

    save() {
        localStorage.setItem('sg_master_vault', JSON.stringify(this.data));
    },

    render() {
        // 1. Render Inventory Categories
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';

        CATEGORIES.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.innerHTML = `<div class="category-header">${cat}</div>`;
            
            const items = this.data.items[cat] || [];
            items.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = `item-row ${item.active ? '' : 'disabled'}`;
                row.innerHTML = `
                    <span>${item.name}</span>
                    <div>
                        <button class="btn btn-small btn-toggle ${item.active ? 'active' : ''}" 
                                onclick="vault.toggleItem('${cat}', ${index})">
                                ${item.active ? 'ON' : 'OFF'}
                        </button>
                        <button class="btn btn-small btn-delete" onclick="vault.deleteItem('${cat}', ${index})">DEL</button>
                    </div>
                `;
                card.appendChild(row);
            });
            grid.appendChild(card);
        });

        // 2. Render Fetishes
        const fList = document.getElementById('fetish-list');
        fList.innerHTML = '';
        this.data.fetishes.forEach((fetish, index) => {
            const span = document.createElement('span');
            span.className = 'fetish-tag';
            span.innerHTML = `${fetish} <button class="btn-delete btn-small" style="border-radius:50%" onclick="vault.deleteFetish(${index})">×</button>`;
            fList.appendChild(span);
        });
    },

    // Logic to Add Items
    addNewItem() {
        const cat = document.getElementById('new-item-cat').value;
        const input = document.getElementById('new-item-name');
        const name = input.value.trim();

        if (name !== "") {
            if (!this.data.items[cat]) this.data.items[cat] = [];
            this.data.items[cat].push({ name: name, active: true });
            
            input.value = ""; // Clear input
            this.save();      // Save to LocalStorage
            this.render();    // Update Master List on screen
        }
    },

    // Logic to Add Fetishes
    addNewFetish() {
        const input = document.getElementById('new-fetish-name');
        const name = input.value.trim();

        if (name !== "") {
            this.data.fetishes.push(name);
            input.value = ""; // Clear input
            this.save();      // Save to LocalStorage
            this.render();    // Update Master List on screen
        }
    },

    toggleItem(cat, index) {
        this.data.items[cat][index].active = !this.data.items[cat][index].active;
        this.save();
        this.render();
    },

    deleteItem(cat, index) {
        if(confirm(`Delete ${this.data.items[cat][index].name} from the vault permanently?`)) {
            this.data.items[cat].splice(index, 1);
            this.save();
            this.render();
        }
    },

    deleteFetish(index) {
        this.data.fetishes.splice(index, 1);
        this.save();
        this.render();
    }
};

/**
 * GAME ENGINE (Flow Control)
 */
const game = {
    start() {
        document.getElementById('setup-page').classList.add('hidden');
        document.getElementById('play-page').classList.remove('hidden');
        // Game logic would proceed here using vault.data.items (filtered by .active)
    }
};

// Start the Vault system on load
window.onload = () => vault.init();
</script>
</body>
</html>
